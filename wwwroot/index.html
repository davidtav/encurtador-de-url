<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/mvp.css"/>
    <title>Encurtador de URL's</title>
</head>
<body>
<header><h1>Encurtador de URL's</h1></header>
<main>
    <section>
        <aside style="width: 25rem">
            <label>
                insira a url
                <input style="width: 22rem;margin: 0.5rem 0" type="url" id="url" >
            </label>
            <button type="button" id="btnSubmit" style="padding: 0.5rem 1rem">enter</button>
            <button type="button" id="btnCopy" style="padding: 0.5rem 1rem; margin-left: 0.5rem" disabled>copiar</button>
            <p id="statusMessage" style="min-height: 1.5rem; margin-top: 0.75rem"></p>
            <p id="urlResult"></p>
        </aside>
    </section>
</main>
<script src="/js/index.js"></script>
</body>
</html>
